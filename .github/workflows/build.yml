name: Build

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            -   uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
                with:
                    fetch-depth: 0
                    persist-credentials: false
            -   uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
                with:
                    global-json-file: global.json
            -   name: Build and create Thunderstore package
                id: build
                run: |
                    dotnet build -c Release -t:PackTS
                    dotnet pack -c Release --no-build -o ./bin/dist
                    cp ./BepisModSettings/bin/Release/BepisModSettings.dll ./bin/dist/
            -   name: Show version
                id: info
                env:
                    VERSION: '${{ steps.build.outputs.version }}'
                run: |
                    echo "Version found: $VERSION"
                    echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            -   name: Upload artifacts
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
                with:
                    name: 'BepisModSettings-${{ steps.build.outputs.version }}-${{ steps.info.outputs.sha_short }}'
                    path: |
                        ./bin/dist/*.nupkg
                        ./bin/dist/*.dll
                        ./build/*.zip